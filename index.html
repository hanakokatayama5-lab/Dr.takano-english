<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高野先生専用 英単語アプリ | Word Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-front: #ffffff;
            --card-back: #f1f5f9;
            --text-main: #1e293b;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        h1 { margin-bottom: 0.2rem; color: var(--primary); font-size: 1.5rem; }
        .subtitle { margin-bottom: 1rem; color: #64748b; font-size: 0.8rem; }

        /* Welcome Overlay */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(37, 99, 235, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        #welcome-overlay h2 { margin-bottom: 1rem; }
        #welcome-overlay p { margin-bottom: 2rem; opacity: 0.9; font-size: 0.9rem; }

        /* Stats & Filters */
        .header-controls {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 1rem;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            font-weight: 700;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.75rem;
        }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 1.2rem; color: var(--primary); }
        .stat-val.done { color: var(--success); }

        .filters { display: flex; gap: 0.5rem; flex-direction: column; }
        select { 
            padding: 0.5rem; 
            border-radius: 0.5rem; 
            border: 1px solid #e2e8f0; 
            font-size: 0.85rem; 
            background-color: #f8fafc;
            font-family: inherit;
        }

        /* Card Container */
        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 400px;
            height: 280px;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-radius: 1.5rem;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 2px solid #fff;
        }

        .card-front { background-color: var(--card-front); }
        .card-back { background-color: var(--card-back); transform: rotateY(180deg); }

        .word-en { font-size: 2.2rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; text-align: center; line-height: 1.1; }
        .word-jp { font-size: 1.5rem; font-weight: 700; color: var(--text-main); text-align: center; }
        .word-pos { font-size: 0.75rem; color: #64748b; background: #e2e8f0; padding: 0.2rem 0.5rem; border-radius: 0.3rem; margin-bottom: 0.5rem; }
        .phrase { font-size: 0.85rem; color: #475569; font-style: italic; margin-top: 1rem; line-height: 1.4; text-align: center; }

        /* Learning Buttons */
        .action-btns {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.95); }

        .btn-start { background: white; color: var(--primary); padding: 1rem 2.5rem; font-size: 1.1rem; }
        .btn-done { background: var(--success); flex: 1; }
        .btn-yet { background: var(--danger); flex: 1; }

        /* Navigation Controls */
        .nav-controls { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; }
        .btn-nav { 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem; 
            border: 1px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
            font-size: 0.85rem;
            color: #64748b;
        }
        .counter { font-size: 0.85rem; color: #64748b; font-weight: 700; }

        .status-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .status-done { background: #dcfce7; color: #166534; }
        .status-yet { background: #fee2e2; color: #991b1b; }

        @keyframes slideNext {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-50px); opacity: 0; }
        }
        .sliding { animation: slideNext 0.15s forwards; }

        .reset-btn { font-size: 0.7rem; color: #cbd5e1; cursor: pointer; margin-top: 1rem; text-decoration: underline; }
        
        .audio-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            margin-top: 0.5rem;
            color: var(--primary);
        }
    </style>
</head>

        <button class="btn btn-start" onclick="startApp()">学習を始める</button>

    <!-- Card Area -->
    <div class="card-container" id="card-trigger">

    <!-- Learning Buttons -->

        <button class="btn btn-done" onclick="markAs('done')">覚えた！ ✅</button>
    </div>

        let allWords = [];
        let displayWords = [];
        let progress = {};
        let currentIndex = 0;
        const synth = window.speechSynthesis;
        let audioEnabled = false;

        function startApp() {
            // Unblock audio by playing empty sound
            const utterance = new SpeechSynthesisUtterance("");
            synth.speak(utterance);
            audioEnabled = true;
            
            document.getElementById('welcome-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-overlay').style.display = 'none';
                showCard(); // Play first card sound
            }, 500);
        }

        function init() {
            const savedProgress = localStorage.getItem('takano_word_progress');
            if (savedProgress) progress = JSON.parse(savedProgress);
            processData(masterData);
        }

        function processData(text) {
            const lines = text.split('\n');
            allWords = lines.map(line => {
                const cols = line.split('\t');
                return {
                    cat: cols[0] || 'Unknown',
                    en: (cols[1] || '').trim(),
                    jp: (cols[2] || '').trim(),
                    pos: (cols[3] || '').trim(),
                    phrase: (cols[4] || '').trim()
                };
            }).filter(w => w.en && !w.en.includes('カテゴリー'));
            updateCategoryFilter();
            filterWords();
        }

        function updateCategoryFilter() {
            const select = document.getElementById('category-filter');
            const cats = [...new Set(allWords.map(w => w.cat))];
            select.innerHTML = '<option value="all">すべてのカテゴリー</option>';
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                select.appendChild(opt);
            });
        }

        function filterWords() {
            const mode = document.getElementById('view-mode').value;
            const cat = document.getElementById('category-filter').value;
            displayWords = allWords.filter(w => {
                const isCatMatch = (cat === 'all' || w.cat === cat);
                const status = progress[w.en] || 'uncheck';
                let isModeMatch = true;
                if (mode === 'unlearned') isModeMatch = (status !== 'done');
                if (mode === 'learned') isModeMatch = (status === 'done');
                return isCatMatch && isModeMatch;
            });
            currentIndex = 0;
            updateStats();
            showCard();
        }

        function updateStats() {
            const total = allWords.length;
            let actualDone = 0;
            allWords.forEach(w => { if (progress[w.en] === 'done') actualDone++; });
            document.getElementById('total-stat').textContent = total;
            document.getElementById('done-stat').textContent = actualDone;
            document.getElementById('yet-stat').textContent = total - actualDone;
        }

        function showCard() {
            const card = document.getElementById('card');
            card.classList.remove('flipped', 'sliding');
            if (displayWords.length === 0) {
                document.getElementById('front-en').textContent = "該当なし";
                document.getElementById('counter').textContent = "0 / 0";
                return;
            }
            const w = displayWords[currentIndex];
            document.getElementById('front-en').textContent = w.en;
            document.getElementById('back-jp').textContent = w.jp;
            document.getElementById('back-pos').textContent = w.pos || '---';
            document.getElementById('back-phrase').textContent = w.phrase || '';
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${displayWords.length}`;
            
            const status = progress[w.en];
            const badge = document.getElementById('status-badge');
            if (status === 'done') {
                badge.textContent = "習得済み ✅";
                badge.className = "status-badge status-done";
            } else if (status === 'yet') {
                badge.textContent = "要復習 ❌";
                badge.className = "status-badge status-yet";
            } else {
                badge.textContent = "";
            }
            if (audioEnabled) speak(w.en);
        }

        function markAs(status) {
            if (displayWords.length === 0) return;
            progress[displayWords[currentIndex].en] = status;
            localStorage.setItem('takano_word_progress', JSON.stringify(progress));
            updateStats();
            const cardTrigger = document.getElementById('card-trigger');
            cardTrigger.classList.add('sliding');
            setTimeout(() => {
                const mode = document.getElementById('view-mode').value;
                if (mode === 'unlearned' && status === 'done') filterWords(); 
                else nextCard();
                cardTrigger.classList.remove('sliding');
            }, 150);
        }

        function flipCard() { document.getElementById('card').classList.toggle('flipped'); }
        function nextCard() { if (displayWords.length <= 1) return; currentIndex = (currentIndex + 1) % displayWords.length; showCard(); }
        function prevCard() { if (displayWords.length <= 1) return; currentIndex = (currentIndex - 1 + displayWords.length) % displayWords.length; showCard(); }
        function shuffleCards() {
            for (let i = displayWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [displayWords[i], displayWords[j]] = [displayWords[j], displayWords[i]];
            }
            currentIndex = 0;
            showCard();
        }

        function resetProgress() {
            if (confirm("全ての学習記録をリセットしますか？")) {
                progress = {};
                localStorage.removeItem('takano_word_progress');
                updateStats();
                filterWords();
            }
        }

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        init();
    </script>
</body>
</html>
